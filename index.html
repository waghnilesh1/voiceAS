<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Voice Assistant</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 400px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .title {
            text-align: center;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #ccc;
            margin-bottom: 20px;
        }

        .chat-box {
            height: 250px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 10px;
            font-size: 14px;
        }

        .msg {
            margin: 8px 0;
            padding: 8px 12px;
            border-radius: 12px;
            display: inline-block;
            max-width: 80%;
        }

        .user {
            background: #0d6efd;
            align-self: flex-end;
            float: right;
            clear: both;
        }

        .bot {
            background: #444;
            float: left;
            clear: both;
        }

        .controls {
            margin-top: 15px;
            text-align: center;
        }

        .mic-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 22px;
        }

        .status {
            text-align: center;
            font-size: 12px;
            margin-top: 10px;
            color: #aaa;
        }

        .typing {
            font-style: italic;
            color: #ccc;
        }
    </style>
</head>

<body>

<div class="app-container">

    <div class="title">🎙 AI Voice Assistant</div>
    <div class="subtitle">Speak or type your command</div>

    <div id="chat" class="chat-box"></div>

    <div class="controls">
        <button class="btn btn-primary mic-btn" onclick="startListening()">🎤</button>
    </div>

    <div class="status" id="status">Click mic and start speaking...</div>

</div>

<script>
    const chat = document.getElementById("chat");
    const statusText = document.getElementById("status");

    function addMessage(text, sender) {
        const div = document.createElement("div");
        div.className = "msg " + sender;
        div.innerText = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function speak(text) {
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = "en-US";
        window.speechSynthesis.speak(speech);
    }

    function startListening() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = "en-US";

        statusText.innerText = "Listening... 🎧";
        recognition.start();

        recognition.onresult = function(event) {
            const text = event.results[0][0].transcript;
            addMessage(text, "user");
            handleCommand(text);
        };

        recognition.onend = () => {
            statusText.innerText = "Click mic and start speaking...";
        };
    }

    function handleCommand(text) {
        text = text.toLowerCase();

        // 🔹 Greeting
        if (text.includes("hello") || text.includes("hi")) {
            let reply = "Hello! How can I help you today?";
            addMessage(reply, "bot");
            speak(reply);
        }

        // 🔹 How are you
        else if (text.includes("how are you")) {
            let reply = "I'm doing great! Ready to assist you.";
            addMessage(reply, "bot");
            speak(reply);
        }

        // 🔹 Your name
        else if (text.includes("your name")) {
            let reply = "I am your AI Voice Assistant.";
            addMessage(reply, "bot");
            speak(reply);
        }

        // 🔹 Date
        else if (text.includes("date")) {
            let date = new Date().toDateString();
            addMessage(date, "bot");
            speak("Today's date is " + date);
        }

        // 🔹 Time
        else if (text.includes("time")) {
            let time = new Date().toLocaleTimeString();
            addMessage(time, "bot");
            speak("Current time is " + time);
        }

        // 🔹 Open websites
        else if (text.includes("open youtube")) {
            window.open("https://www.youtube.com", "_blank");
            speak("Opening YouTube");
        }

        else if (text.includes("open google")) {
            window.open("https://www.google.com", "_blank");
            speak("Opening Google");
        }

        // 🔹 Web Search
        else if (text.includes("search")) {
            let query = text.replace("search", "").trim();
            let url = "https://www.google.com/search?q=" + encodeURIComponent(query);

            window.open(url, "_blank");

            let reply = "Searching for " + query;
            addMessage(reply, "bot");
            speak(reply);
        }

        // 🔹 Fallback → ChatGPT API
        else {
            addMessage("Thinking...", "bot");

            fetch("http://127.0.0.1:5000/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({message: text})
            })
            .then(res => res.json())
            .then(data => {
                chat.lastChild.remove();
                addMessage(data.reply, "bot");
                speak(data.reply);
            })
            .catch(() => {
                chat.lastChild.remove();
                let reply = "Sorry, I couldn't connect to the server.";
                addMessage(reply, "bot");
                speak(reply);
            });
        }
    }
</script>

</body>
</html>
